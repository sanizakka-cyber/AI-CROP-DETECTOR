# ── MSAS FarmAI — Render Infrastructure ──────────────────────────────────────
# Deploy via: https://dashboard.render.com/new/blueprint
# Repo:        https://github.com/sanizakka-cyber/AI-CROP-DETECTOR

services:

  # ── Laravel API + Web Dashboard ────────────────────────────────────────────
  - type: web
    name: msas-farmai
    env: docker
    dockerfilePath: ./msas-system/Dockerfile
    dockerContext: ./msas-system
    region: frankfurt          # Closest to Nigeria
    plan: starter              # $7/mo — keeps app always-on (free tier sleeps)
    healthCheckPath: /api/health

    envVars:
      - key: APP_NAME
        value: "MSAS Livestock & Agro Services"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        value: https://msasagro.com
      - key: APP_KEY
        value: base64:zf4kOSElJqhjPHVbnqtHlewu4REVVxmq54M/BAVdPVo=
      - key: APP_LOCALE
        value: en

      # Database — auto-wired from the PostgreSQL service below
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: msas-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: msas-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: msas-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: msas-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: msas-db
          property: password

      # Session / Cache (no Redis needed initially)
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_ENCRYPT
        value: "false"
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync

      # Logging → Render log viewer
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Domain & CORS
      - key: SANCTUM_STATEFUL_DOMAINS
        value: msasagro.com,www.msasagro.com
      - key: SESSION_DOMAIN
        value: .msasagro.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://msasagro.com,https://www.msasagro.com

      # AI Engine — points to the msas-ai-engine service below
      - key: AI_ENGINE_URL
        value: https://ai.msasagro.com
      - key: AI_ENGINE_KEY
        value: c543a8d59df08d157d4cbce65fd3a1bbeefb408ecb810d2360ea17b21225f2dc

      # Mail — set MAIL_PASSWORD in Render dashboard (not here)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_SCHEME
        value: tls
      - key: MAIL_USERNAME
        value: REPLACE_WITH_GMAIL
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        value: noreply@msasagro.com
      - key: MAIL_FROM_NAME
        value: "MSAS FarmAI"

      # Paystack — set secrets in Render dashboard
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PAYMENT_URL
        value: https://api.paystack.co

      - key: FILESYSTEM_DISK
        value: local

  # ── AI Inference Engine (Python / FastAPI) ────────────────────────────────
  - type: web
    name: msas-ai-engine
    env: python
    region: frankfurt
    plan: starter
    rootDir: ai-engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      # Set ANTHROPIC_API_KEY in the Render dashboard (sync: false keeps it secret)
      - key: ANTHROPIC_API_KEY
        sync: false
      # Must match AI_ENGINE_KEY in the msas-farmai service above
      - key: API_KEY
        value: c543a8d59df08d157d4cbce65fd3a1bbeefb408ecb810d2360ea17b21225f2dc

# ── PostgreSQL Database ───────────────────────────────────────────────────────
databases:
  - name: msas-db
    databaseName: msas_production
    user: msas_user
    plan: free                 # Free 90-day trial → upgrade to Starter ($7/mo) after
    region: frankfurt
